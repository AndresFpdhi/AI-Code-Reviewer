services:
  api:
    build:
      context: ./src/Backend
      dockerfile: CodeReviewer.Api/Dockerfile
    ports:
      - "5000:10000"
    environment:
      ASPNETCORE_URLS: http://+:10000
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Data Source=/data/reviews.db
      Cors__AllowedOrigins: http://localhost:4200
      Groq__ApiKey: ${GROQ_API_KEY:-}
      GitHubApp__AppId: ${GITHUB_APP_ID:-}
      GitHubApp__PrivateKeyPath: /secrets/github-app.pem
      GitHubApp__WebhookSecret: ${GITHUB_WEBHOOK_SECRET:-}
    volumes:
      - api-data:/data
      - ./secrets:/secrets:ro

volumes:
  api-data:
