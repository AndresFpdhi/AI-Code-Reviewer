name: frontend-ci

on:
  push:
    branches: [main]
    paths: ['src/Frontend/**', '.github/workflows/frontend-ci.yml']
  pull_request:
    paths: ['src/Frontend/**', '.github/workflows/frontend-ci.yml']

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Frontend/code-reviewer-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/Frontend/code-reviewer-ui/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npx ng build --configuration=production
      - name: Test
        run: npx ng test --watch=false --browsers=ChromeHeadless
